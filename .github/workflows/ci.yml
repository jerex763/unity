name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backup-restore:
    name: Backup restore
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: unity_source
          POSTGRES_USER: unity
          POSTGRES_PASSWORD: unity
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U unity -d unity_source"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install backup tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes age postgresql-client shellcheck

      - name: Check shell scripts
        run: shellcheck ops/backup/*.sh

      - name: Create restore target
        env:
          PGPASSWORD: unity
        run: createdb --host 127.0.0.1 --username unity unity_restore

      - name: Test encrypted backup and restore
        env:
          SOURCE_DATABASE_URL: postgresql://unity:unity@127.0.0.1:5432/unity_source
          TARGET_DATABASE_URL: postgresql://unity:unity@127.0.0.1:5432/unity_restore
        run: ops/backup/test_restore.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Black
        run: black --check .

      - name: Run tests
        run: pytest

      - name: Run Django checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: python manage.py check

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Check formatting with Prettier
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Build PWA
        run: npm run build
