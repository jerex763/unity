name: Production database backup

on:
  # Daily scheduling stays paused until the production setup in Issue #99 is
  # configured and a manual backup/restore drill has succeeded.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Encrypt and store backup
    runs-on: ubuntu-latest
    environment: production-backup
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
      BACKUP_AGE_RECIPIENT: ${{ secrets.BACKUP_AGE_RECIPIENT }}
      BACKUP_DESTINATION: ${{ secrets.BACKUP_S3_URI }}
      AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.BACKUP_AWS_REGION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install backup tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes age awscli postgresql-client

      - name: Create encrypted backup
        run: ops/backup/backup.sh

      - name: Alert on failure
        if: failure()
        env:
          BACKUP_ALERT_WEBHOOK_URL: ${{ secrets.BACKUP_ALERT_WEBHOOK_URL }}
        run: |
          if [[ -z "${BACKUP_ALERT_WEBHOOK_URL}" ]]; then
            echo "::error::BACKUP_ALERT_WEBHOOK_URL is not configured"
            exit 1
          fi
          curl --fail --silent --show-error \
            --max-time 15 \
            --header "Content-Type: application/json" \
            --data '{"text":"Unity scheduled database backup failed. Check GitHub Actions."}' \
            "${BACKUP_ALERT_WEBHOOK_URL}"
